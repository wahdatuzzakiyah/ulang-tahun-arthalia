<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Dancing Script, cursive;
            background: linear-gradient(to right, #f8d7da, #e8a0aa);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #f8f8f8;
            padding: 50px;
            border-radius: 25px;
            max-width: 850px;
            width: 90%;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ff4b91;
            font-size: 70px;
            margin-bottom: 30px;
            animation: bounce 2s infinite, glow 2s ease-in-out infinite alternate;
        }

        p {
            font-family: 'Dancing Script', cursive;
            font-size: 38px;
            color: #ff69b4;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        img {
            width: 320px;
            max-width: 100%;
            border-radius: 20px;
            margin: 25px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            background: #ff4b91;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-family: 'Caveat', cursive;
            font-size: 32px;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn:hover {
            background: #ff2f7d;
            transform: scale(1.08);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-15px);
            }
            60% {
                transform: translateY(-8px);
            }
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #fff;
            }
            to {
                text-shadow: 0 0 20px #ff69b4, 0 0 30px #ff69b4;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Selamat Ulang Tahun Thalia Geulis!</h1>

        <p>
           Maaf yaa baru ngucapin hehee
           Semoga kebahagian, kesehatan, keselamatan dan rezeki yang melimpah selalu mengiri kamu yaa tal ❤️
        </p>

        <img src="{{ url_for('static', filename='foto.jpeg') }}" alt="Foto Ulang Tahun">

        <p>
            aku ada puisi nich, jangan lupa baca yaww ❤️
        </p>

        <a href="/puisi" class="btn" target="_blank">for thalia</a>
    </div>

</body>
</html>
